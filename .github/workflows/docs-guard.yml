name: docs-guard

on:
  pull_request:
  push:
    branches: [main]

jobs:
  coupling-marker-gate:
    name: coupling-marker grep gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Fail the build on any workspace-coupling marker in shipped content.
      #
      # IMPORTANT: this gate scans skill/doc content only — .md/.ps1/.sh/.json/.txt —
      # and EXCLUDES .github/workflows/ from its own scan. The regex literal below
      # necessarily spells out the very marker words it forbids; if the gate scanned
      # this workflow file it would trip on itself. Excluding the workflows directory
      # is the deliberate fix, not an oversight.
      #
      # Allowlist exception: the academic citation "Steinhardt" (arXiv:2201.03544) is
      # legitimately matched by the `stein` substring and must NOT fail the build. We
      # strip those lines before grepping.
      - name: Scan for coupling markers
        shell: bash
        run: |
          set -euo pipefail
          PATTERN='mnemoverse|C:[\\/]Projects|secrets\.ps1|bootstrap\.ps1|secrets-map|Bitwarden|qdrant|kdg|slod|\bstein\b'
          echo "Scanning .md/.ps1/.sh/.json/.txt content (excluding .github/workflows) for coupling markers..."
          # Collect candidate files, excluding the workflows dir and the git metadata dir.
          mapfile -t FILES < <(
            find . \
              -type d \( -path './.git' -o -path './.github/workflows' \) -prune -o \
              -type f \( -name '*.md' -o -name '*.ps1' -o -name '*.sh' -o -name '*.json' -o -name '*.txt' \) -print
          )
          HITS=0
          for f in "${FILES[@]}"; do
            # Strip the allowlisted academic citation before matching, case-insensitively.
            if grep -nEi "$PATTERN" "$f" | grep -vi 'Steinhardt' | grep -q .; then
              echo "::error file=$f::coupling marker found"
              grep -nEi "$PATTERN" "$f" | grep -vi 'Steinhardt' || true
              HITS=1
            fi
          done
          if [ "$HITS" -ne 0 ]; then
            echo "Coupling-marker gate FAILED. Scrub the markers above before merge."
            exit 1
          fi
          echo "Coupling-marker gate passed: no markers found."

      # Fail on leaked build-wrapper tags (e.g. </content>, </invoke>) — these are
      # distillation/transform artifacts that must never ship in skill markdown.
      # Same self-exclusion of .github/workflows as the coupling gate above.
      - name: Scan for leaked build-wrapper tags
        shell: bash
        run: |
          set -euo pipefail
          echo "Scanning for orphan build-wrapper tags..."
          mapfile -t FILES < <(
            find . \
              -type d \( -path './.git' -o -path './.github/workflows' \) -prune -o \
              -type f \( -name '*.md' -o -name '*.ps1' -o -name '*.sh' -o -name '*.json' -o -name '*.txt' \) -print
          )
          HITS=0
          for f in "${FILES[@]}"; do
            if grep -nE '^[[:space:]]*</(content|invoke|document|file_content|parameter)>[[:space:]]*$' "$f" | grep -q .; then
              echo "::error file=$f::leaked build-wrapper tag"
              grep -nE '^[[:space:]]*</(content|invoke|document|file_content|parameter)>[[:space:]]*$' "$f" || true
              HITS=1
            fi
          done
          if [ "$HITS" -ne 0 ]; then
            echo "Build-wrapper-tag gate FAILED. Strip the tags above before merge."
            exit 1
          fi
          echo "Build-wrapper-tag gate passed: no orphan tags found."

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !.github/**

  validate-manifests:
    name: validate plugin + marketplace manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Dogfood: run the validate-plugin-marketplace discipline against our own manifests.
      # The full skill runs inside Claude Code; in CI we assert the structural invariants
      # the skill checks — valid JSON, required keys, and the local "./" source form.
      - name: Validate manifest JSON and required fields
        shell: bash
        run: |
          set -euo pipefail
          MARKET=.claude-plugin/marketplace.json
          PLUGIN=.claude-plugin/plugin.json

          echo "Validating $MARKET and $PLUGIN are well-formed JSON..."
          python3 -c "import json,sys; json.load(open('$MARKET')); json.load(open('$PLUGIN'))"

          echo "Asserting marketplace.json shape (name, plugins[0].source == './', strict present)..."
          python3 - <<'PY'
          import json, sys
          m = json.load(open(".claude-plugin/marketplace.json"))
          assert m.get("name"), "marketplace.json: missing 'name'"
          plugins = m.get("plugins")
          assert isinstance(plugins, list) and plugins, "marketplace.json: 'plugins' must be a non-empty list"
          p0 = plugins[0]
          assert p0.get("source") == "./", "marketplace.json: plugins[0].source must be the local './' form"
          assert "strict" in p0, "marketplace.json: plugins[0] should declare 'strict'"
          assert p0.get("name"), "marketplace.json: plugins[0] missing 'name'"
          print("marketplace.json OK")
          PY

          echo "Asserting plugin.json shape (name, version, author, keywords)..."
          python3 - <<'PY'
          import json
          p = json.load(open(".claude-plugin/plugin.json"))
          for key in ("name", "version", "description", "author", "keywords"):
              assert p.get(key), f"plugin.json: missing '{key}'"
          assert isinstance(p["keywords"], list) and p["keywords"], "plugin.json: 'keywords' must be a non-empty list"
          print("plugin.json OK")
          PY
